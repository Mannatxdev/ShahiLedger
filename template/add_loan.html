<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Loan | Shahi Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .loan-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 550px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border);
            position: relative;
        }

        .loan-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 24px 24px 0 0;
        }

        .header {
            margin-bottom: 30px;
            text-align: left;
        }

        h2 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 6px;
        }

        form p {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        input, select, textarea {
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #ffffff;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            transform: translateY(-1px);
        }

        select, input[name*="amount"] {
            font-weight: 600;
            color: var(--text-main);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--text-main);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background-color: #000;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .cancel-btn {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .cancel-btn:hover {
            color: #ef4444;
        }

        .errorlist {
            background: #fff1f2;
            color: #e11d48;
            padding: 15px;
            border-radius: 12px;
            list-style: none;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border: 1px solid #ffe4e6;
        }
    </style>
</head>
<body>

<div class="loan-container">
    <div class="header">
        <h2>Record Loan Entry</h2>
        <p>Manage debt and credit with specific people</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        
        {% if form.errors %}
            {{ form.errors }}
        {% endif %}

        {{ form.as_p }}

        <button type="submit">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
            </svg>
            Save Loan Entry
        </button>
    </form>

    <a href="javascript:history.back()" class="cancel-btn">Discard and return</a>
</div>

</body>
</html>
