<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Report | Shahi Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .report-container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        h2 { font-size: 1.75rem; font-weight: 700; margin-bottom: 8px; }
        .period { color: var(--text-muted); font-size: 0.9rem; }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .stat-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .net-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #e2e8f0;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }

        .net-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--primary);
        }

        .net-value {
            font-size: 2.25rem;
            font-weight: 800;
            margin-top: 4px;
        }

        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .text-primary { color: var(--primary); }

        .btn-export {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--text-main);
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn-export:hover {
            transform: translateY(-2px);
            background: #000;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="report-container">
    <div class="header">
        <h2>Monthly Report</h2>
        <p class="period">Financial summary for the current month</p>
    </div>

    <div class="summary-grid">
        <div class="stat-card">
            <div class="stat-label">Total Income</div>
            <div class="stat-value text-success">₹ {{ total_income }}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Expense</div>
            <div class="stat-value text-danger">₹ {{ total_expense }}</div>
        </div>
    </div>

    <div class="net-card">
        <div class="stat-label">Net Profit / Loss</div>
        <div class="net-value {% if net >= 0 %}text-success{% else %}text-danger{% endif %}">
            ₹ {{ net }}
        </div>
    </div>

    <a href="{% url 'export_monthly' %}" class="btn-export">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="浸4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
        </svg>
        Download Excel Report
    </a>

    <a href="javascript:history.back()" class="back-link">Return to Dashboard</a>
</div>

</body>
</html>
